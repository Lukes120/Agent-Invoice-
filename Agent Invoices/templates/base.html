<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Odoo Invoice Agent{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            odoo: {
              50: '#faf5ff',
              100: '#f3e8ff',
              200: '#e9d5ff',
              300: '#d8b4fe',
              400: '#c084fc',
              500: '#a855f7',
              600: '#9333ea',
              700: '#7e22ce',
              800: '#6b21a8',
              900: '#581c87',
              950: '#3b0764',
              dark: '#714B67',
              main: '#875A7B'
            }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px;
             font-size: 11px; font-weight: 500; }
    .badge-green { background: #d1fae5; color: #065f46; }
    .badge-amber { background: #fef3c7; color: #92400e; }
    .badge-red   { background: #fee2e2; color: #991b1b; }
    .badge-blue  { background: #dbeafe; color: #1e40af; }
    .badge-purple { background: #ede9fe; color: #5b21b6; }
    .badge-gray  { background: #f3f4f6; color: #374151; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800">

<nav class="bg-odoo-dark text-white shadow-lg">
  <div class="max-w-7xl mx-auto px-4">
    <div class="flex items-center justify-between h-14">
      <div class="flex items-center space-x-8">
        <a href="/" class="flex items-center space-x-2">
          <div class="w-8 h-8 bg-odoo-main rounded flex items-center justify-center font-bold">OA</div>
          <span class="font-semibold">Invoice Agent</span>
        </a>
        <div class="hidden md:flex space-x-1 text-sm">
          <a href="/" class="px-3 py-2 rounded hover:bg-odoo-main transition">Dashboard</a>
          <a href="/invoices" class="px-3 py-2 rounded hover:bg-odoo-main transition">Fatture</a>
          <a href="/history" class="px-3 py-2 rounded hover:bg-odoo-main transition">Storico</a>
          <a href="/settings" class="px-3 py-2 rounded hover:bg-odoo-main transition">Configurazione</a>
        </div>
      </div>
      <div class="text-xs opacity-75">
        Ecotel Italia - Sola lettura
      </div>
    </div>
  </div>
</nav>

<main class="max-w-7xl mx-auto px-4 py-6">
  {% block content %}{% endblock %}
</main>

<footer class="mt-12 py-6 border-t border-gray-200 text-center text-xs text-gray-400">
  Odoo Invoice Matching Agent - Fase 1 (solo OdA)
</footer>

{% block scripts %}{% endblock %}

</body>
</html>
